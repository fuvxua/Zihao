<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>公告 - 子豪的论坛</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="js/tailwind-config.js"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="font-sans bg-gradient-to-br from-white via-slate-50 to-green-50 text-ink antialiased min-h-screen">

  <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-lg border-none shadow-sm shadow-green-900/5">
    <div class="max-w-7xl mx-auto px-6 lg:px-10 flex items-center h-[60px]">
      <a href="index.html" class="text-lg font-bold text-emerald-800 tracking-tight no-underline shrink-0">子豪的论坛</a>
      <div id="nav-center" class="flex items-center gap-1 flex-1 justify-center"></div>
      <div id="nav-right" class="flex items-center gap-1 shrink-0"></div>
    </div>
  </nav>

  <div class="max-w-4xl mx-auto px-6 lg:px-10 py-8">
    <!-- 页面头部 -->
    <div class="flex items-center gap-2.5 mb-7">
      <svg class="text-primary" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      <h1 class="text-xl font-bold text-slate-800 tracking-tight">公告列表</h1>
    </div>

    <!-- 公告列表 -->
    <div id="announcement-list" class="flex flex-col gap-4">
      <div class="text-center py-10 text-sm text-subtle">加载中...</div>
    </div>
  </div>

  <div class="text-center py-8 text-sm text-subtle">© 2024 子豪的论坛 · 用心交流，分享每一份思考</div>

  <script src="js/auth.js"></script>
  <script src="js/posts.js"></script>
  <script src="js/announcements.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async function() {
      var user = await checkAuth();
      loadAnnouncements('announcement-list');
      if (user) checkAndShowAnnouncementPopup();
    });
  </script>
</body>
</html>
