<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>帖子详情 - 子豪的论坛</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="js/tailwind-config.js"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="font-sans bg-gradient-to-br from-white via-slate-50 to-green-50 text-ink antialiased min-h-screen">

  <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-lg border-none shadow-sm shadow-green-900/5">
    <div class="max-w-7xl mx-auto px-6 lg:px-10 flex items-center h-[60px]">
      <a href="index.html" class="text-lg font-bold text-emerald-800 tracking-tight no-underline shrink-0">子豪的论坛</a>
      <div id="nav-center" class="flex items-center gap-1 flex-1 justify-center"></div>
      <div id="nav-right" class="flex items-center gap-1 shrink-0"></div>
    </div>
  </nav>

  <div class="max-w-7xl mx-auto px-6 lg:px-10 py-8">
    <div id="post-detail" class="bg-white rounded-card shadow-sm shadow-green-900/5 p-7 mb-6">
      <div class="text-center py-10 text-sm text-subtle">加载中...</div>
    </div>

    <div class="bg-white rounded-card shadow-sm shadow-green-900/5 p-6 mb-6">
      <h2 class="text-base font-bold text-ink mb-4">回复</h2>
      <div id="replies-list" class="divide-y divide-slate-200/50">
        <div class="text-center py-10 text-sm text-subtle">加载中...</div>
      </div>
    </div>

    <div id="reply-form-box" class="bg-white rounded-card shadow-sm shadow-green-900/5 p-6">
      <h2 class="text-base font-bold text-ink mb-4">发表回复</h2>
      <div id="reply-error" class="hidden px-4 py-2.5 rounded-xl bg-red-50 text-red-600 text-sm mb-4"></div>
      <form id="reply-form">
        <div class="mb-4">
          <textarea id="reply-content" required placeholder="请输入回复内容" rows="4" class="w-full px-3.5 py-2.5 rounded-xl bg-slate-50 border-none text-sm focus:ring-2 focus:ring-primary/20 outline-none resize-y"></textarea>
        </div>
        <button type="submit" class="bg-primary text-white rounded-xl px-6 py-2.5 text-sm font-semibold hover:bg-primary-hover transition-all duration-200">提交回复</button>
      </form>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/posts.js"></script>
  <script src="js/replies.js"></script>
  <script src="js/announcements.js"></script>
  <script>
    var currentPostId = null;

    document.addEventListener('DOMContentLoaded', async function() {
      var user = await checkAuth();
      if (user) checkAndShowAnnouncementPopup();

      var urlParams = new URLSearchParams(window.location.search);
      currentPostId = urlParams.get('id');

      if (!currentPostId) {
        document.getElementById('post-detail').innerHTML = '<div class="text-center py-10 text-subtle"><p class="mb-4">帖子不存在</p><a href="index.html" class="bg-primary text-white rounded-full px-6 py-2.5 text-sm font-semibold hover:bg-primary-hover transition-all no-underline">返回首页</a></div>';
        return;
      }

      var post = await loadPost(currentPostId);
      var detailDiv = document.getElementById('post-detail');

      if (!post) {
        detailDiv.innerHTML = '<div class="text-center py-10 text-subtle"><p class="mb-4">帖子不存在或已被删除</p><a href="index.html" class="bg-primary text-white rounded-full px-6 py-2.5 text-sm font-semibold hover:bg-primary-hover transition-all no-underline">返回首页</a></div>';
        document.getElementById('reply-form-box').style.display = 'none';
        return;
      }

      var isAuthor = user && user.objectId === post.authorId;
      var admin = await isAdmin();
      var canDelete = isAuthor || admin;

      document.title = post.title + ' - 子豪的论坛';

      detailDiv.innerHTML =
        '<div class="mb-5 pb-4 border-b border-slate-200/50">' +
        '<h1 class="text-2xl font-bold text-ink tracking-tight mb-2">' + escapeHtml(post.title) + '</h1>' +
        '<div class="flex items-center gap-4 text-[13px] text-slate-500">' +
        '<span class="flex items-center gap-1">' + renderUserAvatar(post.authorName, post.avatarUrl, 24) + ' ' + escapeHtml(post.authorName) + '</span>' +
        '<span>发布时间: ' + formatTime(post.createdAt) + '</span>' +
        '</div></div>' +
        '<div class="text-base leading-[1.85] whitespace-pre-wrap break-words text-ink">' + renderPostContent(post.content) + '</div>' +
        (canDelete ? '<div class="mt-5 pt-4 border-t border-slate-200/50 flex gap-2">' +
        '<button class="bg-primary text-white rounded-xl px-4 py-2 text-xs font-semibold hover:bg-primary-hover transition-all" onclick="handleEditPost()">编辑</button>' +
        '<button class="bg-red-500 text-white rounded-xl px-4 py-2 text-xs font-semibold hover:bg-red-600 transition-all" onclick="handleDeletePost()">删除帖子</button></div>' : '');

      await loadReplies(currentPostId, 'replies-list');
    });

    document.getElementById('reply-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      var errorDiv = document.getElementById('reply-error');
      errorDiv.classList.add('hidden');

      var content = document.getElementById('reply-content').value.trim();
      if (!content) {
        errorDiv.textContent = '回复内容不能为空';
        errorDiv.classList.remove('hidden');
        return;
      }

      try {
        await createReply(currentPostId, content);
        document.getElementById('reply-content').value = '';
        await loadReplies(currentPostId, 'replies-list');
      } catch (err) {
        errorDiv.textContent = '回复失败: ' + (err.message || '请重试');
        errorDiv.classList.remove('hidden');
      }
    });

    async function handleDeletePost() {
      if (!confirm('确定要删除这篇帖子吗？')) return;
      try {
        await deletePost(currentPostId);
        window.location.href = 'index.html';
      } catch (err) {
        alert('删除失败: ' + err.message);
      }
    }

    async function handleEditPost() {
      var post = await loadPost(currentPostId);
      if (!post) return;

      var detailDiv = document.getElementById('post-detail');
      detailDiv.innerHTML =
        '<h3 class="text-lg font-bold text-ink mb-4">编辑帖子</h3>' +
        '<div class="mb-4"><label class="block text-sm font-semibold mb-1.5">标题</label>' +
        '<input type="text" id="edit-title" value="' + escapeHtml(post.title) + '" maxlength="100" class="w-full px-3.5 py-2.5 rounded-xl bg-slate-50 border-none text-sm focus:ring-2 focus:ring-primary/20 outline-none"></div>' +
        '<div class="mb-4"><label class="block text-sm font-semibold mb-1.5">内容</label>' +
        '<textarea id="edit-content" rows="10" class="w-full px-3.5 py-2.5 rounded-xl bg-slate-50 border-none text-sm focus:ring-2 focus:ring-primary/20 outline-none resize-y">' + escapeHtml(post.content) + '</textarea></div>' +
        '<div class="flex gap-2">' +
        '<button class="bg-primary text-white rounded-xl px-4 py-2 text-xs font-semibold hover:bg-primary-hover transition-all" onclick="handleSaveEdit()">保存</button>' +
        '<button class="bg-slate-100 text-slate-600 rounded-xl px-4 py-2 text-xs font-semibold hover:bg-slate-200 transition-all" onclick="location.reload()">取消</button></div>';
    }

    async function handleSaveEdit() {
      var title = document.getElementById('edit-title').value.trim();
      var content = document.getElementById('edit-content').value.trim();
      if (!title || !content) { alert('标题和内容不能为空'); return; }
      try {
        await updatePost(currentPostId, title, content);
        location.reload();
      } catch (err) {
        alert('保存失败: ' + err.message);
      }
    }
  </script>

</body>
</html>
