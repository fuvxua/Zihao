<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - 子豪的论坛</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="js/tailwind-config.js"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-page">

  <div class="login-background" aria-hidden="true">
    <span class="grid-glow grid-glow-a"></span>
    <span class="grid-glow grid-glow-b"></span>
    <span class="scan-line"></span>
  </div>

  <main class="login-shell">
    <section class="login-hero" aria-label="论坛简介">
      <div class="hero-kicker">CONNECTED COMMUNITY</div>
      <h1>子豪的论坛</h1>
      <p>进入你的数字交流空间，发布想法、参与讨论，并与更多同频的人保持连接。</p>
      <div class="hero-metrics" aria-hidden="true">
        <div>
          <strong>热帖</strong>
          <span>精彩讨论</span>
        </div>
        <div>
          <strong>好友</strong>
          <span>同频交流</span>
        </div>
        <div>
          <strong>成长</strong>
          <span>每天进步</span>
        </div>
      </div>
    </section>

    <section class="login-card" aria-label="登录注册面板">
      <div class="login-brand">
        <div class="login-logo">M</div>
        <h2>欢迎回来</h2>
        <p>登录账号，继续探索社区新动态</p>
      </div>

      <div class="login-tabs" role="tablist" aria-label="账号操作">
        <button class="login-tab active" type="button" data-tab="login" role="tab">登录</button>
        <button class="login-tab" type="button" data-tab="register" role="tab">注册</button>
      </div>

      <div class="login-form-panel active" id="panel-login">
        <div class="msg msg-error" id="login-error"></div>
        <form id="login-form">
          <div class="form-group">
            <label for="login-email">用户名或邮箱</label>
            <input type="text" id="login-email" required placeholder="请输入用户名或邮箱" autocomplete="username">
          </div>
          <div class="form-group">
            <label for="login-password">密码</label>
            <input type="password" id="login-password" required placeholder="请输入密码" minlength="6" autocomplete="current-password">
          </div>
          <button type="submit" class="btn btn-primary btn-block">进入论坛</button>
        </form>
      </div>

      <div class="login-form-panel" id="panel-register">
        <div class="msg msg-error" id="register-error"></div>
        <div class="msg msg-success" id="register-success"></div>
        <form id="register-form">
          <div class="form-group">
            <label for="register-name">昵称</label>
            <input type="text" id="register-name" required placeholder="请输入昵称" maxlength="20" autocomplete="name">
          </div>
          <div class="form-group">
            <label for="register-email">邮箱</label>
            <input type="email" id="register-email" required placeholder="请输入邮箱" autocomplete="email">
          </div>
          <div class="form-group">
            <label for="register-password">密码</label>
            <input type="password" id="register-password" required placeholder="请输入密码（至少6位）" minlength="6" autocomplete="new-password">
          </div>
          <button type="submit" class="btn btn-primary btn-block">创建账号</button>
        </form>
      </div>
    </section>
  </main>

  <script src="js/auth.js"></script>
  <script>
    document.querySelectorAll('.login-tab').forEach(tab => {
      tab.addEventListener('click', function() {
        document.querySelectorAll('.login-tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.login-form-panel').forEach(p => p.classList.remove('active'));
        this.classList.add('active');
        document.getElementById('panel-' + this.dataset.tab).classList.add('active');
      });
    });

    document.getElementById('login-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      const errorDiv = document.getElementById('login-error');
      errorDiv.style.display = 'none';

      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;

      try {
        await login(email, password);
        const urlParams = new URLSearchParams(window.location.search);
        const returnUrl = urlParams.get('return');
        window.location.href = returnUrl ? decodeURIComponent(returnUrl) : 'index.html';
      } catch (err) {
        errorDiv.textContent = '登录失败: ' + (err.message || '请检查邮箱和密码');
        errorDiv.style.display = 'block';
      }
    });

    document.getElementById('register-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      const errorDiv = document.getElementById('register-error');
      const successDiv = document.getElementById('register-success');
      errorDiv.style.display = 'none';
      successDiv.style.display = 'none';

      const name = document.getElementById('register-name').value.trim();
      const email = document.getElementById('register-email').value.trim();
      const password = document.getElementById('register-password').value;

      try {
        await register(email, password, name);
        successDiv.textContent = '注册成功！请切换到登录';
        successDiv.style.display = 'block';
        document.getElementById('register-form').reset();
        setTimeout(() => {
          document.querySelector('.login-tab[data-tab="login"]').click();
        }, 1000);
      } catch (err) {
        errorDiv.textContent = '注册失败: ' + (err.message || '请检查输入内容');
        errorDiv.style.display = 'block';
      }
    });
  </script>

</body>
</html>
