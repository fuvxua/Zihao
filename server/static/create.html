<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>发帖 - 子豪的论坛</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="js/tailwind-config.js"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="font-sans bg-gradient-to-br from-white via-slate-50 to-green-50 text-ink antialiased min-h-screen">

  <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-lg border-none shadow-sm shadow-green-900/5">
    <div class="max-w-7xl mx-auto px-6 lg:px-10 flex items-center h-[60px]">
      <a href="index.html" class="text-lg font-bold text-emerald-800 tracking-tight no-underline shrink-0">子豪的论坛</a>
      <div id="nav-center" class="flex items-center gap-1 flex-1 justify-center"></div>
      <div id="nav-right" class="flex items-center gap-1 shrink-0"></div>
    </div>
  </nav>

  <div class="max-w-7xl mx-auto px-6 lg:px-10 py-8">
    <h1 class="text-xl font-bold text-slate-800 tracking-tight mb-7">发表新帖</h1>
    <div class="bg-white rounded-card shadow-sm shadow-green-900/5 p-7">
      <div id="create-error" class="hidden px-4 py-2.5 rounded-xl bg-red-50 text-red-600 text-sm mb-4"></div>
      <form id="create-form">
        <div class="mb-4">
          <label class="block text-sm font-semibold text-ink mb-1.5">标题</label>
          <input type="text" id="post-title" required placeholder="请输入帖子标题" maxlength="100" class="w-full px-3.5 py-2.5 rounded-xl bg-slate-50 border-none text-sm focus:ring-2 focus:ring-primary/20 outline-none">
        </div>
        <div class="mb-4">
          <label class="block text-sm font-semibold text-ink mb-1.5">内容</label>
          <textarea id="post-content" required placeholder="请输入帖子内容" rows="8" class="w-full px-3.5 py-2.5 rounded-xl bg-slate-50 border-none text-sm focus:ring-2 focus:ring-primary/20 outline-none resize-y"></textarea>
        </div>
        <div class="mb-4">
          <label class="block text-sm font-semibold text-ink mb-1.5">图片（可选）</label>
          <div id="upload-area" class="border-2 border-dashed border-slate-200/60 rounded-card p-6 text-center cursor-pointer transition-all hover:border-primary hover:text-primary text-subtle">
            <p>点击或拖拽图片到此处上传</p>
            <p class="text-xs mt-1">支持 JPG、PNG、GIF、WebP，最大 5MB</p>
            <input type="file" id="image-input" accept="image/*" multiple class="hidden">
          </div>
          <div id="image-preview" class="flex flex-wrap gap-2 mt-2"></div>
        </div>
        <div class="flex gap-3">
          <button type="submit" class="bg-primary text-white rounded-xl px-6 py-2.5 text-sm font-semibold hover:bg-primary-hover transition-all duration-200">发布帖子</button>
          <a href="index.html" class="bg-slate-100 text-slate-600 rounded-xl px-6 py-2.5 text-sm font-semibold hover:bg-slate-200 transition-all duration-200 no-underline">取消</a>
        </div>
      </form>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/posts.js"></script>
  <script src="js/announcements.js"></script>
  <script>
    const uploadedImages = [];
    document.addEventListener('DOMContentLoaded', async function() {
      const session = await requireAuth();
      if (!session) return;
      checkAndShowAnnouncementPopup();
      const uploadArea = document.getElementById('upload-area');
      const imageInput = document.getElementById('image-input');
      const previewDiv = document.getElementById('image-preview');
      uploadArea.addEventListener('click', () => imageInput.click());
      uploadArea.addEventListener('dragover', (e) => { e.preventDefault(); uploadArea.classList.add('dragover'); });
      uploadArea.addEventListener('dragleave', () => { uploadArea.classList.remove('dragover'); });
      uploadArea.addEventListener('drop', (e) => { e.preventDefault(); uploadArea.classList.remove('dragover'); handleFiles(e.dataTransfer.files); });
      imageInput.addEventListener('change', (e) => { handleFiles(e.target.files); imageInput.value = ''; });
      async function handleFiles(files) {
        for (const file of files) {
          if (!file.type.startsWith('image/')) continue;
          if (file.size > 5 * 1024 * 1024) { alert('图片超过5MB限制'); continue; }
          try {
            uploadArea.querySelector('p').textContent = '上传中...';
            const url = await uploadImage(file);
            uploadedImages.push(url);
            const item = document.createElement('div');
            item.className = 'relative w-20 h-20 rounded-lg overflow-hidden';
            item.innerHTML = '<img src="' + url + '" class="w-full h-full object-cover"><button class="absolute top-0.5 right-0.5 w-5 h-5 bg-black/60 text-white border-none rounded-full cursor-pointer text-xs flex items-center justify-center" onclick="removeImage(this, \'' + url + '\')">&times;</button>';
            previewDiv.appendChild(item);
            uploadArea.querySelector('p').textContent = '点击或拖拽图片到此处上传';
          } catch (err) { alert('上传失败: ' + err.message); uploadArea.querySelector('p').textContent = '点击或拖拽图片到此处上传'; }
        }
      }
      document.getElementById('create-form').addEventListener('submit', async function(e) {
        e.preventDefault();
        const errorDiv = document.getElementById('create-error');
        errorDiv.classList.add('hidden');
        const title = document.getElementById('post-title').value.trim();
        let content = document.getElementById('post-content').value.trim();
        if (!title || !content) { errorDiv.textContent = '标题和内容不能为空'; errorDiv.classList.remove('hidden'); return; }
        if (uploadedImages.length > 0) content += '\n\n' + uploadedImages.map(url => '[img:' + url + ']').join('\n');
        try { await createPost(title, content); window.location.href = 'index.html'; }
        catch (err) { errorDiv.textContent = '发帖失败: ' + (err.message || '请重试'); errorDiv.classList.remove('hidden'); }
      });
    });
    function removeImage(btn, url) { const idx = uploadedImages.indexOf(url); if (idx > -1) uploadedImages.splice(idx, 1); btn.parentElement.remove(); }
  </script>
</body>
</html>
