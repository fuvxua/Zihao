<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>发帖 - 我的论坛</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- 导航栏 -->
  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="logo">我的论坛</a>
      <ul class="nav-links" id="nav-links"></ul>
    </div>
  </nav>

  <!-- 主内容 -->
  <div class="container">
    <h1 class="page-title">发表新帖</h1>
    <div class="post-detail">
      <div class="msg msg-error" id="create-error"></div>
      <form id="create-form">
        <div class="form-group">
          <label>标题</label>
          <input type="text" id="post-title" required placeholder="请输入帖子标题" maxlength="100">
        </div>
        <div class="form-group">
          <label>内容</label>
          <textarea id="post-content" required placeholder="请输入帖子内容" rows="8"></textarea>
        </div>
        <button type="submit" class="btn btn-primary">发布帖子</button>
        <a href="index.html" class="btn" style="background:#eee; color:#333; margin-left:12px;">取消</a>
      </form>
    </div>
  </div>

  <!-- JS -->
  <script src="https://cdn.bootcdn.net/ajax/libs/supabase/2.49.1/umd/supabase.min.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/posts.js"></script>
  <script>
    // 需要登录
    document.addEventListener('DOMContentLoaded', async function() {
      const session = await requireAuth();
      if (!session) return;

      document.getElementById('create-form').addEventListener('submit', async function(e) {
        e.preventDefault();
        const errorDiv = document.getElementById('create-error');
        errorDiv.style.display = 'none';

        const title = document.getElementById('post-title').value.trim();
        const content = document.getElementById('post-content').value.trim();

        if (!title || !content) {
          errorDiv.textContent = '标题和内容不能为空';
          errorDiv.style.display = 'block';
          return;
        }

        try {
          await createPost(title, content);
          window.location.href = 'index.html';
        } catch (err) {
          errorDiv.textContent = '发帖失败: ' + (err.message || '请重试');
          errorDiv.style.display = 'block';
        }
      });
    });
  </script>

</body>
</html>
