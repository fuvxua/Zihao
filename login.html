<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - 我的论坛</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-page">

  <div class="login-wrapper">
    <div class="login-card">
      <div class="login-brand">
        <div class="login-logo">M</div>
        <h1>我的论坛</h1>
        <p>仅供授权用户使用</p>
      </div>

      <div class="login-tabs">
        <div class="login-tab active" data-tab="login">登录</div>
        <div class="login-tab" data-tab="register">注册</div>
      </div>

      <!-- 登录表单 -->
      <div class="login-form-panel active" id="panel-login">
        <div class="msg msg-error" id="login-error"></div>
        <form id="login-form">
          <div class="form-group">
            <label>邮箱</label>
            <input type="email" id="login-email" required placeholder="请输入邮箱">
          </div>
          <div class="form-group">
            <label>密码</label>
            <input type="password" id="login-password" required placeholder="请输入密码" minlength="6">
          </div>
          <button type="submit" class="btn btn-primary btn-block">登录</button>
        </form>
      </div>

      <!-- 注册表单 -->
      <div class="login-form-panel" id="panel-register">
        <div class="msg msg-error" id="register-error"></div>
        <div class="msg msg-success" id="register-success"></div>
        <form id="register-form">
          <div class="form-group">
            <label>昵称</label>
            <input type="text" id="register-name" required placeholder="请输入昵称" maxlength="20">
          </div>
          <div class="form-group">
            <label>邮箱</label>
            <input type="email" id="register-email" required placeholder="请输入邮箱">
          </div>
          <div class="form-group">
            <label>密码</label>
            <input type="password" id="register-password" required placeholder="请输入密码（至少6位）" minlength="6">
          </div>
          <button type="submit" class="btn btn-primary btn-block">注册</button>
        </form>
      </div>

    </div>
  </div>

  <!-- JS -->
  <script src="lib/av-min.js"></script>
  <script src="js/av-init.js"></script>
  <script src="js/auth.js"></script>
  <script>
    // Tab 切换
    document.querySelectorAll('.login-tab').forEach(tab => {
      tab.addEventListener('click', function() {
        document.querySelectorAll('.login-tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.login-form-panel').forEach(p => p.classList.remove('active'));
        this.classList.add('active');
        document.getElementById('panel-' + this.dataset.tab).classList.add('active');
      });
    });

    // 登录表单
    document.getElementById('login-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      const errorDiv = document.getElementById('login-error');
      errorDiv.style.display = 'none';

      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;

      try {
        await login(email, password);
        const urlParams = new URLSearchParams(window.location.search);
        const returnUrl = urlParams.get('return');
        window.location.href = returnUrl ? decodeURIComponent(returnUrl) : 'index.html';
      } catch (err) {
        errorDiv.textContent = '登录失败: ' + (err.message || '请检查邮箱和密码');
        errorDiv.style.display = 'block';
      }
    });

    // 注册表单
    document.getElementById('register-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      const errorDiv = document.getElementById('register-error');
      const successDiv = document.getElementById('register-success');
      errorDiv.style.display = 'none';
      successDiv.style.display = 'none';

      const name = document.getElementById('register-name').value.trim();
      const email = document.getElementById('register-email').value.trim();
      const password = document.getElementById('register-password').value;

      try {
        await register(email, password, name);
        successDiv.textContent = '注册成功！请切换到登录';
        successDiv.style.display = 'block';
        document.getElementById('register-form').reset();
        // 自动切到登录 tab
        setTimeout(() => {
          document.querySelector('.login-tab[data-tab="login"]').click();
        }, 1000);
      } catch (err) {
        errorDiv.textContent = '注册失败: ' + (err.message || '请检查输入');
        errorDiv.style.display = 'block';
      }
    });
  </script>

</body>
</html>
