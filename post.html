<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>帖子详情 - 我的论坛</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- 导航栏 -->
  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="logo">我的论坛</a>
      <ul class="nav-links" id="nav-links"></ul>
    </div>
  </nav>

  <!-- 主内容 -->
  <div class="container">
    <div class="post-detail" id="post-detail">
      <div class="loading">加载中...</div>
    </div>

    <div class="replies-section">
      <h2>回复</h2>
      <div id="replies-list">
        <div class="loading">加载中...</div>
      </div>
    </div>

    <div class="reply-form" id="reply-form-box">
      <h2>发表回复</h2>
      <div class="msg msg-error" id="reply-error"></div>
      <form id="reply-form">
        <div class="form-group">
          <textarea id="reply-content" required placeholder="请输入回复内容" rows="4"></textarea>
        </div>
        <button type="submit" class="btn btn-primary">提交回复</button>
      </form>
    </div>
  </div>

  <!-- JS -->
  <script src="lib/av-min.js"></script>
  <script src="js/av-init.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/posts.js"></script>
  <script src="js/replies.js"></script>
  <script>
    var currentPostId = null;

    document.addEventListener('DOMContentLoaded', async function() {
      var user = await requireAuth();
      if (!user) return;

      var urlParams = new URLSearchParams(window.location.search);
      currentPostId = urlParams.get('id');

      if (!currentPostId) {
        document.getElementById('post-detail').innerHTML = '<div class="empty-state"><p>帖子不存在</p><a href="index.html" class="btn btn-primary">返回首页</a></div>';
        return;
      }

      var post = await loadPost(currentPostId);
      var detailDiv = document.getElementById('post-detail');

      if (!post) {
        detailDiv.innerHTML = '<div class="empty-state"><p>帖子不存在或已被删除</p><a href="index.html" class="btn btn-primary">返回首页</a></div>';
        document.getElementById('reply-form-box').style.display = 'none';
        return;
      }

      var isAuthor = user && user.id === post.get('authorId');
      var admin = await isAdmin();
      var canDelete = isAuthor || admin;

      document.title = post.get('title') + ' - 我的论坛';

      detailDiv.innerHTML =
        '<div class="post-header">' +
        '<h1>' + escapeHtml(post.get('title')) + '</h1>' +
        '<div class="post-meta">' +
        '<span class="post-author">' + renderUserAvatar(post.get('authorName'), post.get('avatarUrl'), 24) + ' ' + escapeHtml(post.get('authorName')) + '</span>' +
        '<span>发布时间: ' + formatTime(post.createdAt) + '</span>' +
        '</div></div>' +
        '<div class="post-body">' + renderPostContent(post.get('content')) + '</div>' +
        (canDelete ? '<div class="post-actions"><button class="btn btn-primary btn-sm" onclick="handleEditPost()">编辑</button> <button class="btn btn-danger btn-sm" onclick="handleDeletePost()">删除帖子</button></div>' : '');

      await loadReplies(currentPostId, 'replies-list');
    });

    document.getElementById('reply-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      var errorDiv = document.getElementById('reply-error');
      errorDiv.style.display = 'none';

      var content = document.getElementById('reply-content').value.trim();
      if (!content) {
        errorDiv.textContent = '回复内容不能为空';
        errorDiv.style.display = 'block';
        return;
      }

      try {
        await createReply(currentPostId, content);
        document.getElementById('reply-content').value = '';
        await loadReplies(currentPostId, 'replies-list');
      } catch (err) {
        errorDiv.textContent = '回复失败: ' + (err.message || '请重试');
        errorDiv.style.display = 'block';
      }
    });

    async function handleDeletePost() {
      if (!confirm('确定要删除这篇帖子吗？')) return;
      try {
        await deletePost(currentPostId);
        window.location.href = 'index.html';
      } catch (err) {
        alert('删除失败: ' + err.message);
      }
    }

    async function handleEditPost() {
      var post = await loadPost(currentPostId);
      if (!post) return;

      var detailDiv = document.getElementById('post-detail');
      detailDiv.innerHTML =
        '<div class="edit-form">' +
        '<h3>编辑帖子</h3>' +
        '<div class="form-group"><label>标题</label>' +
        '<input type="text" id="edit-title" value="' + escapeHtml(post.get('title')) + '" maxlength="100"></div>' +
        '<div class="form-group"><label>内容</label>' +
        '<textarea id="edit-content" rows="10">' + escapeHtml(post.get('content')) + '</textarea></div>' +
        '<div class="edit-actions">' +
        '<button class="btn btn-primary btn-sm" onclick="handleSaveEdit()">保存</button> ' +
        '<button class="btn btn-sm" style="background:#eee;color:#333;margin-left:8px;" onclick="location.reload()">取消</button>' +
        '</div></div>';
    }

    async function handleSaveEdit() {
      var title = document.getElementById('edit-title').value.trim();
      var content = document.getElementById('edit-content').value.trim();

      if (!title || !content) {
        alert('标题和内容不能为空');
        return;
      }

      try {
        await updatePost(currentPostId, title, content);
        location.reload();
      } catch (err) {
        alert('保存失败: ' + err.message);
      }
    }
  </script>

</body>
</html>
