<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理后台 - 我的论坛</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- 导航栏 -->
  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="logo">我的论坛</a>
      <ul class="nav-links" id="nav-links"></ul>
    </div>
  </nav>

  <!-- 主内容 -->
  <div class="container">
    <div class="admin-header">
      <h1>管理后台</h1>
    </div>

    <div class="admin-tabs">
      <div class="admin-tab active" data-tab="posts">帖子管理</div>
      <div class="admin-tab" data-tab="users">用户管理</div>
      <div class="admin-tab" data-tab="stats">数据统计</div>
    </div>

    <!-- 帖子管理 -->
    <div class="admin-panel active" id="panel-posts">
      <div id="admin-posts-list">
        <div class="loading">加载中...</div>
      </div>
      <div id="admin-posts-pagination" style="display:flex; gap:8px; justify-content:center; margin-top:16px;"></div>
    </div>

    <!-- 用户管理 -->
    <div class="admin-panel" id="panel-users">
      <div id="admin-users-list">
        <div class="loading">加载中...</div>
      </div>
    </div>

    <!-- 数据统计 -->
    <div class="admin-panel" id="panel-stats">
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-number" id="stat-posts">-</div>
          <div class="stat-label">总帖子数</div>
        </div>
        <div class="stat-card">
          <div class="stat-number" id="stat-users">-</div>
          <div class="stat-label">注册用户</div>
        </div>
        <div class="stat-card">
          <div class="stat-number" id="stat-today">-</div>
          <div class="stat-label">今日新增帖子</div>
        </div>
      </div>
    </div>
  </div>

  <!-- JS -->
  <script src="lib/av-min.js"></script>
  <script src="js/av-init.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/posts.js"></script>
  <script src="js/admin.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async function() {
      // 权限检查
      const session = await requireAuth();
      if (!session) return;

      const admin = await isAdmin();
      if (!admin) {
        alert('权限不足，需要管理员权限。');
        window.location.href = 'index.html';
        return;
      }

      // Tab 切换
      document.querySelectorAll('.admin-tab').forEach(tab => {
        tab.addEventListener('click', function() {
          document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
          document.querySelectorAll('.admin-panel').forEach(p => p.classList.remove('active'));
          this.classList.add('active');
          document.getElementById('panel-' + this.dataset.tab).classList.add('active');

          // 懒加载数据
          if (this.dataset.tab === 'posts') loadAdminPosts();
          if (this.dataset.tab === 'users') loadAdminUsers();
          if (this.dataset.tab === 'stats') loadAdminStats();
        });
      });

      // 初始加载帖子列表
      loadAdminPosts();
    });
  </script>

</body>
</html>
