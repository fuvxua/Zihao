<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理后台 - 子豪的论坛</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="js/tailwind-config.js"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="font-sans bg-gradient-to-br from-white via-slate-50 to-green-50 text-ink antialiased min-h-screen">

  <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-lg border-none shadow-sm shadow-green-900/5">
    <div class="max-w-7xl mx-auto px-6 lg:px-10 flex items-center justify-between h-[60px]">
      <a href="index.html" class="text-lg font-bold text-emerald-800 tracking-tight no-underline">子豪的论坛</a>
      <ul class="flex items-center gap-1 list-none" id="nav-links"></ul>
    </div>
  </nav>

  <div class="max-w-7xl mx-auto px-6 lg:px-10 py-8">
    <div class="flex items-center justify-between mb-6">
      <h1 class="text-2xl font-bold text-ink">管理后台</h1>
    </div>

    <div class="flex gap-1 border-b-2 border-slate-200/50 mb-6">
      <div class="admin-tab active px-5 py-2.5 cursor-pointer font-semibold text-sm text-subtle border-b-2 border-transparent -mb-0.5 transition-all hover:text-ink select-none" data-tab="posts">帖子管理</div>
      <div class="admin-tab px-5 py-2.5 cursor-pointer font-semibold text-sm text-subtle border-b-2 border-transparent -mb-0.5 transition-all hover:text-ink select-none" data-tab="users">用户管理</div>
      <div class="admin-tab px-5 py-2.5 cursor-pointer font-semibold text-sm text-subtle border-b-2 border-transparent -mb-0.5 transition-all hover:text-ink select-none" data-tab="stats">数据统计</div>
      <div class="admin-tab px-5 py-2.5 cursor-pointer font-semibold text-sm text-subtle border-b-2 border-transparent -mb-0.5 transition-all hover:text-ink select-none" data-tab="announcements">公告管理</div>
    </div>

    <!-- 帖子管理 -->
    <div class="admin-panel block" id="panel-posts">
      <div id="admin-posts-list">
        <div class="text-center py-10 text-sm text-subtle">加载中...</div>
      </div>
      <div id="admin-posts-pagination" class="flex gap-2 justify-center mt-4"></div>
    </div>

    <!-- 用户管理 -->
    <div class="admin-panel hidden" id="panel-users">
      <div id="admin-users-list">
        <div class="text-center py-10 text-sm text-subtle">加载中...</div>
      </div>
    </div>

    <!-- 数据统计 -->
    <div class="admin-panel hidden" id="panel-stats">
      <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-6">
        <div class="bg-white rounded-card shadow-sm shadow-green-900/5 p-6 text-center">
          <div class="text-4xl font-bold text-primary mb-1" id="stat-posts">-</div>
          <div class="text-sm text-subtle">总帖子数</div>
        </div>
        <div class="bg-white rounded-card shadow-sm shadow-green-900/5 p-6 text-center">
          <div class="text-4xl font-bold text-primary mb-1" id="stat-users">-</div>
          <div class="text-sm text-subtle">注册用户</div>
        </div>
        <div class="bg-white rounded-card shadow-sm shadow-green-900/5 p-6 text-center">
          <div class="text-4xl font-bold text-primary mb-1" id="stat-today">-</div>
          <div class="text-sm text-subtle">今日新增帖子</div>
        </div>
      </div>
    </div>

    <!-- 公告管理 -->
    <div class="admin-panel hidden" id="panel-announcements">
      <div class="mb-4">
        <button class="bg-primary text-white rounded-xl px-4 py-2 text-xs font-semibold hover:bg-primary-hover transition-all" onclick="showAnnouncementForm()">发布公告</button>
      </div>
      <div id="announcement-form-area"></div>
      <div id="admin-announcements-list">
        <div class="text-center py-10 text-sm text-subtle">加载中...</div>
      </div>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/posts.js"></script>
  <script src="js/admin.js"></script>
  <script src="js/announcements.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async function() {
      const session = await requireAuth();
      if (!session) return;
      const admin = await isAdmin();
      if (!admin) { alert('权限不足'); window.location.href = 'index.html'; return; }

      document.querySelectorAll('.admin-tab').forEach(tab => {
        tab.addEventListener('click', function() {
          document.querySelectorAll('.admin-tab').forEach(t => { t.classList.remove('active'); t.style.borderBottomColor = 'transparent'; t.style.color = ''; });
          document.querySelectorAll('.admin-panel').forEach(p => { p.classList.add('hidden'); p.classList.remove('block'); });
          this.classList.add('active');
          this.style.borderBottomColor = '#4a8c6f';
          this.style.color = '#4a8c6f';
          var panel = document.getElementById('panel-' + this.dataset.tab);
          panel.classList.remove('hidden');
          panel.classList.add('block');
          if (this.dataset.tab === 'posts') loadAdminPosts();
          if (this.dataset.tab === 'users') loadAdminUsers();
          if (this.dataset.tab === 'stats') loadAdminStats();
          if (this.dataset.tab === 'announcements') loadAdminAnnouncements();
        });
      });
      loadAdminPosts();
    });
  </script>
</body>
</html>
